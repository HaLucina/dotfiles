# -----------------------------------------------------------
# キーバインドのカスタマイズ (manager)
# -----------------------------------------------------------

# 誤削除防止：d 1回では何もしないようにし、dd でゴミ箱へ
[[mgr.prepend_keymap]]
on   = [ "d", "d" ]
run  = "remove"
desc = "Move selected files to trash"

# 環境に依存しないパスコピー
# shellコマンドを使わず、Yazi標準の `copy path` を使うのがベストです
[[mgr.prepend_keymap]]
on   = [ "y", "p" ]
run  = "copy path"
desc = "Copy path to clipboard"

# [おまけ] もし「ファイル名だけ」をコピーしたい場合も y n などで追加可能です
[[mgr.prepend_keymap]]
on   = [ "y", "n" ]
run  = "copy filename"
desc = "Copy filename to clipboard"

# デフォルトだとEnterがopenでフォルダにEnterするとフォルダ名のファイルを作成してnvimで開いてしまう。
# 対策として`l`と同じ挙動の`exec = "enter"`を割り当てる。
[[manager.prepend_keymap]]
on   = [ "<Enter>" ]
exec = "enter"
desc = "Enter the child directory, or open the file"
