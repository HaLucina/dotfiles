[mgr]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
skip           = ["*.tmp", ".git"]

[opener]
edit = [
  { run = 'nvim "$@"', block = true }
]

open = [
  { run = 'xdg-open "$@"', desc = "Open" }
]

[open]
rules = [
    # 1. MIMEタイプが text で始まるものはエディタで開く
    { mime = "text/*", use = ["edit", "open"] },
    
    # 2. Luaファイルや設定ファイルを明示的にエディタに関連付ける
    { name = "*.lua", use = ["edit", "open"] },
    { name = "*.txt", use = ["edit", "open"] },
    { name = "*.conf", use = ["edit", "open"] },

    # 3. JSONやスクリプト系も追加（必要に応じて）
    { mime = "application/json", use = ["edit", "open"] },
    { mime = "application/x-sh", use = ["edit", "open"] },

    # 4. 【重要】どれにも当てはまらない場合、とりあえずエディタとxdg-openを出す
    { name = "*", use = ["edit", "open"] }
]
