# src=https://man.archlinux.org/man/extra/keyd/keyd.1.en
# 
# memo
# stow はデフォルトで 「一つ上の階層（../）」 にリンクを作ろうとしますが、/etc のようなシステム領域にリンクを張るには、リンク先を明示的に指定する必要があります。
# 以下の手順で解決できます。
# 
# 1. ディレクトリ構造の確認
# stow は指定したディレクトリの「中身」をそのまま展開します。
# 今の構造が dotfiles/keyd/etc/keyd/default.conf なら、keyd をパッケージ名として指定する場合、そのままでは ../etc/keyd/default.conf にリンクを張ろうとします。
# 
# 2. 正しい実行コマンド
# /etc はルート権限が必要な場所なので、sudo を使い、かつターゲットディレクトリ（-t）を /（ルート）に指定する必要があります。
# 
# dotfiles/ ディレクトリに移動して、以下のコマンドを実行してください。
# 
# Bash
# # -t / で、リンクの起点をルートディレクトリに指定
# # -v で詳細表示、-S でリンク作成
# sudo stow -v -t / keyd
# 3. なぜ今までのやり方でできなかったのか？
# ターゲットディレクトリの不一致: オプションなしで stow keyd を実行すると、dotfiles/ の一つ上（つまり /home/halucina/）に etc/keyd/... を作ろうとしてしまいます。/etc に作りたい場合は -t / が必須です。
# 
# パーミッション: /etc 以下への書き込み（シンボリックリンク作成）は一般ユーザーでは許可されていないため、sudo が必要です。
#
[ids]
*

[main]
# CapsLock を無効化し、押している間だけ nav レイヤー
capslock = layer(nav)

# 通常の矢印はそのまま（Fn誤爆無効化などは別途 noop 可能）
up    = noop
down  = noop
left  = noop
right = noop

# ":"を左辺に指定することができないのでmainでセミコロン入力時にコロンに変更
# shift押下時はセミコロン入力時もセミコロンになるようにする。
; = :

[shift]
; = ;

[control]
[ = esc

[nav]
backspace = delete
h = left
j = down
k = up
l = right
u = pageup
d = pagedown
a = end
i = home

1 = f1
2 = f2
3 = f3
4 = f4
5 = f5
6 = f6
7 = f7
8 = f8
9 = f9
0 = f10
minus = f11
equal = f12

# aとiのhomeとendの違いは主にブラウザ内で複数行ある文章の最初と最後に移動すること
g = C-home

[nav+shift]
g = C-end
